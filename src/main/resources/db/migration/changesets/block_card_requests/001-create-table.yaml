databaseChangeLog:
  - changeSet:
      id: 001-create-table-block-card-requests
      author: serverus
      changes:
        - createTable:
            tableName: block_card_requests
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_block_card_requests
                    nullable: false
              - column:
                  name: card_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_block_card_requests_card_id_cards
                    referencedTableName: cards
                    referencedColumnNames: id
              - column:
                  name: completed
                  type: BOOLEAN
                  constraints:
                    nullable: false
